# ==================================================
# MangoWM Monitor Rules for Host: taumac
# ==================================================

# Fallback profile using your laptop's internal panel
monitorrule=name:^eDP-1$,x:0,y:0,scale:1.0

# Binding Persistent Tags 1-7 to Laptop Panel
tagrule=tag:1,monitor:eDP-1,layout:dwindle
tagrule=tag:2,monitor:eDP-1,layout:dwindle
tagrule=tag:3,monitor:eDP-1,layout:dwindle
tagrule=tag:4,monitor:eDP-1,layout:dwindle
tagrule=tag:5,monitor:eDP-1,layout:dwindle
tagrule=tag:6,monitor:eDP-1,layout:dwindle

