# =====================================================================
# MangoWM Secondary Autostart & Service Initializations (autostart.conf)
# =====================================================================

# 1. Desktop & Authentication Daemons (Optimized for UWSM)
# UWSM launches desktop environments inside systemd target scopes natively. 
# Instead of spawning background binaries directly, we call their target services.
exec-once=systemctl --user start hyprpolkitagent
exec-once=${pkgs.kdePackages.kwallet-pam}/libexec/pam_kwallet_init
exec-once=kwallet-query -l kdewallet

# 2. Storage, Cloud, & Network Background Engines
exec-once=maestral start
exec-once=maestral_qt
exec-once=nm-applet
exec-once=blueman-applet

# 3. Persistent Clipboard Configuration
exec-once=wl-clip-persist --clipboard regular & clipse -listen

# 4. Notification Layer & Remote Utilities
exec-once=swaync
exec-once=swaync-client -df
exec-once=remmina -i

# 5. UI Layout, Panels & Wallpaper Routines
exec-once=sleep 1 && random_wall
exec-once=waybar

# 6. Compositor Hot-Reload Hook (Equivalent to Hyprland's `exec`)
# Whenever you refresh MangoWM, this tells Waybar to naturally reload its configuration
# stream without breaking layout matrices or crashing panel structures.
exec=waybar-reload
