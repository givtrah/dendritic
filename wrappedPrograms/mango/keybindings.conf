# =====================================================================
# MangoWM Keybindings Configuration (keybindings.conf)
# =====================================================================

# Core Application Bindings
bind = SUPER, Return, spawn, kitty
bind = SUPER, space, spawn, rofi -show drun
bind = SUPER, Q, killactive
bind = SUPER, E, spawn, thunar
bind = SUPER, B, spawn, xdg-open https://

# Utilities & Window States
bind = SUPER, W, spawn, wall-random
bind = SUPER+SHIFT, W, spawn, waybar-reload
bind = SUPER, F, fullscreen, 0
bind = SUPER+SHIFT, P, spawn, flameshot gui
bind = SUPER, V, togglefloating

# Session Control
bind = SUPER, Escape, spawn, hyprlock
bind = SUPER+SHIFT, Escape, quit

# Focus Management (Directional: 0=L, 1=R, 2=U, 3=D)
bind = SUPER, left, focusdir, 0
bind = SUPER, right, focusdir, 1
bind = SUPER, up, focusdir, 2
bind = SUPER, down, focusdir, 3

# Window Layout Swapping (Directional: 0=L, 1=R, 2=U, 3=D)
bind = SUPER+SHIFT, left, swapdir, 0
bind = SUPER+SHIFT, right, swapdir, 1
bind = SUPER+SHIFT, up, swapdir, 2
bind = SUPER+SHIFT, down, swapdir, 3

# Window Resizing Actions
bind = SUPER, minus, resizewidth, -100
bind = SUPER, equal, resizewidth, 100
bind = SUPER+SHIFT, minus, resizeheight, -100
bind = SUPER+SHIFT, equal, resizeheight, 100

# View Tags (Equivalent to Switch Workspaces)
bind = SUPER, 1, view, 1
bind = SUPER, 2, view, 2
bind = SUPER, 3, view, 3
bind = SUPER, 4, view, 4
bind = SUPER, 5, view, 5
bind = SUPER, 6, view, 6
bind = SUPER, 7, view, 7
bind = SUPER, 8, view, 8
bind = SUPER, 9, view, 9

# Relative Tag Navigation
bind = SUPER, comma, view_tag_relative, -1
bind = SUPER, period, view_tag_relative, 1

# Move Active Windows to Specified Tags
bind = SUPER+SHIFT, 1, tag, 1
bind = SUPER+SHIFT, 2, tag, 2
bind = SUPER+SHIFT, 3, tag, 3
bind = SUPER+SHIFT, 4, tag, 4
bind = SUPER+SHIFT, 5, tag, 5
bind = SUPER+SHIFT, 6, tag, 6 
bind = SUPER+SHIFT, 7, tag, 7 
bind = SUPER+SHIFT, 8, tag, 8
bind = SUPER+SHIFT, 9, tag, 9

# Media Keys & Hardware Drivers (Volume / Brightness Control)
bind = NONE, XF86AudioRaiseVolume, spawn, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bind = NONE, XF86AudioLowerVolume, spawn, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = NONE, XF86AudioMute, spawn, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = NONE, XF86AudioMicMute, spawn, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind = NONE, XF86MonBrightnessUp, spawn, brightnessctl s 10%+
bind = NONE, XF86MonBrightnessDown, spawn, brightnessctl s 10%-

# Media Streaming Player Controls
bind = NONE, XF86AudioNext, spawn, playerctl next
bind = NONE, XF86AudioPause, spawn, playerctl play-pause
bind = NONE, XF86AudioPlay, spawn, playerctl play-pause
bind = NONE, XF86AudioPrev, spawn, playerctl previous
